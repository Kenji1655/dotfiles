# tmux configuration - Gruvbox Dark Hard
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",alacritty:Tc,xterm-256color:Tc"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5
bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"
bind a last-window
bind Space next-layout

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -in"

set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-bg "#1d2021"
set -g status-fg "#ebdbb2"
set -g status-left "#[fg=#fabd2f,bold] #S "
set -g status-right "#[fg=#a89984] %H:%M #[fg=#83a598] #h "
setw -g window-status-format "#[fg=#a89984] #I:#W "
setw -g window-status-current-format "#[fg=#fabd2f,bold] #I:#W "
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#fabd2f"
set -g message-style "bg=#282828,fg=#ebdbb2"
set -g mode-style "bg=#504945,fg=#ebdbb2"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'

if-shell '[ -d ~/.tmux/plugins/tpm ]' 'run ~/.tmux/plugins/tpm/tpm'
