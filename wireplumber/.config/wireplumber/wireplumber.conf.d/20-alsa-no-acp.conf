# On this ThinkPad E14 Gen 6 AMD, PipeWire audio works correctly without ACP,
# but WirePlumber's ACP backend emits a startup warning. Disable ACP probing
# through a rule, because the default ALSA monitor script forces ACP on first.
monitor.alsa.rules = [
  {
    matches = [
      {
        device.name = "~alsa_card.*"
      }
    ]
    actions = {
      update-props = {
        api.alsa.use-acp = false
        api.alsa.use-ucm = true
      }
    }
  }
]
