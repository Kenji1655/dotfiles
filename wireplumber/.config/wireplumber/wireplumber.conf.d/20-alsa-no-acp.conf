# Use WirePlumber's normal ALSA Card Profile/UCM path. Disabling ACP exposes
# raw ALSA nodes that can appear as 64-channel devices and create noisy or
# unstable startup probing.
monitor.alsa.rules = [
  {
    matches = [
      {
        device.name = "~alsa_card.*"
      }
    ]
    actions = {
      update-props = {
        api.alsa.use-acp = true
        api.alsa.use-ucm = true
      }
    }
  }
]
