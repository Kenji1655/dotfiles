# Alacritty configuration - Gruvbox Dark Hard
[window]
decorations = "None"
opacity = 0.94
padding = { x = 14, y = 10 }

[font]
size = 11
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }

[scrolling]
history = 10000
multiplier = 3

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 500

[bell]
animation = "EaseOutExpo"
duration = 100
color = "#3c3836"

[colors.primary]
background = "#1d2021"
foreground = "#fbf1c7"

[colors.cursor]
text = "#1d2021"
cursor = "#fbf1c7"

[colors.selection]
text = "#fbf1c7"
background = "#3c3836"

[colors.normal]
black = "#282828"
red = "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue = "#458588"
magenta = "#b16286"
cyan = "#689d6a"
white = "#a89984"

[colors.bright]
black = "#928374"
red = "#fb4934"
green = "#b8bb26"
yellow = "#fabd2f"
blue = "#83a598"
magenta = "#d3869b"
cyan = "#8ec07c"
white = "#ebdbb2"
