# ly display manager configuration
# Blackhole-inspired preset: minimal UI, near-black background, no animation.
animation = none
animation_timeout_sec = 0
blank_box = false
hide_borders = true
hide_key_hints = true
hide_version_string = true
clock = %H:%M
clear_password = true
bg = 0x20000000
fg = 0x00ebdbb2
border_fg = 0x003c3836
colormix_col1 = 0x20000000
colormix_col2 = 0x001d2021
colormix_col3 = 0x003c3836
