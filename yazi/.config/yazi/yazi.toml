[manager]
ratio = [1, 3, 4]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = true
show_symlink = true
scrolloff = 8
mouse_events = ["click", "scroll", "touch", "move", "drag"]
title_format = "FILE MANAGER - {cwd}"

[preview]
tab_size = 2
max_width = 1200
max_height = 1800
cache_dir = ""
image_delay = 20
image_quality = 75
sixel_fraction = 15
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
  { run = '${EDITOR:-nvim} "$@"', block = true, desc = "EDIT IN NVIM" },
]
open = [
  { run = 'xdg-open "$@"', orphan = true, desc = "OPEN" },
]
reveal = [
  { run = 'thunar "$@"', orphan = true, desc = "REVEAL IN THUNAR" },
]

[open]
prepend_rules = [
  { mime = "text/*", use = "edit" },
  { mime = "application/json", use = "edit" },
  { mime = "inode/directory", use = "open" },
]
