# Portable baseline profile.
#
# This profile keeps hardware-specific configuration disabled while preserving
# desktop, package and development tooling setup.

DOTFILES_PROFILE_NAME="portable"
DOTFILES_PROFILE_DESCRIPTION="Portable Arch+i3 baseline without ThinkPad, DisplayLink or GRUB hardware tuning"

ENABLE_THINKPAD_STACK=0
ENABLE_DISPLAYLINK=0
ENABLE_GRUB_THEME=0
ENABLE_BLUETOOTH=1
ENABLE_DOCKER=1
ENABLE_UFW=1
ENABLE_ZRAM=1
ENABLE_SYSTEMD_HOMED=0
DISABLE_POWER_PROFILES_DAEMON=0

LY_TTY="tty2"
GRUB_THEME_NAME="lenovo-thinkpad-efi"
GRUB_KERNEL_FLAGS=""
