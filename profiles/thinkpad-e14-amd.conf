# Machine profile for Kenji's ThinkPad E14 Gen 6 AMD.
#
# Override locally with profiles/<profile>.local.conf. Local overrides are
# ignored by git and should contain host-only preferences, never secrets.

DOTFILES_PROFILE_NAME="thinkpad-e14-amd"
DOTFILES_PROFILE_DESCRIPTION="ThinkPad E14 Gen 6 AMD with i3wm, TLP, thinkfan, zram and optional DisplayLink dock"

ENABLE_THINKPAD_STACK=1
ENABLE_DISPLAYLINK=1
ENABLE_GRUB_THEME=1
ENABLE_BLUETOOTH=1
ENABLE_DOCKER=1
ENABLE_UFW=1
ENABLE_ZRAM=1
ENABLE_SYSTEMD_HOMED=1
DISABLE_POWER_PROFILES_DAEMON=1

LY_TTY="tty2"
GRUB_THEME_NAME="lenovo-thinkpad-efi"
GRUB_KERNEL_FLAGS="thinkpad_acpi.fan_control=1"
