# Polybar configuration - Gruvbox Dark Hard

[colors]
bg = #1d2021
bg0 = #282828
bg1 = #3c3836
bg2 = #504945
bg3 = #665c54
fg = #ebdbb2
cream = #fbf1c7
warm = #d5c4a1
fg4 = #a89984
red = #fb4934
green = #b8bb26
yellow = #fabd2f
blue = #83a598
aqua = #8ec07c

[bar/base]
width = 100%
height = 34
fixed-center = true
background = ${colors.bg}
foreground = ${colors.fg}
border-bottom-size = 2
border-bottom-color = ${colors.bg0}
line-size = 3
padding-left = 2
padding-right = 2
module-margin = 1
font-0 = JetBrainsMono Nerd Font:size=10;3
font-1 = JetBrainsMono Nerd Font:size=13;4
cursor-click = pointer
enable-ipc = true

[bar/primary]
inherit = bar/base
monitor = ${env:MONITOR:eDP}
modules-left = i3
modules-center = date
modules-right = power-profile sep pulseaudio sep backlight sep temperature cpu sep network sep battery sep keyboard sep notifications sep tray

[bar/external]
inherit = bar/base
monitor = ${env:MONITOR:HDMI-A-0}
modules-left = i3
modules-center = date
modules-right = power-profile sep pulseaudio sep backlight sep temperature cpu sep network sep battery sep keyboard sep notifications

[module/sep]
type = custom/text
format = |
format-foreground = ${colors.bg3}

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = false
index-sort = true
wrapping-scroll = false
format = <label-state> <label-mode>
label-focused = %name%
label-focused-foreground = ${colors.cream}
label-focused-background = ${colors.bg1}
label-focused-underline = ${colors.cream}
label-focused-padding = 2
label-unfocused = %name%
label-unfocused-foreground = ${colors.warm}
label-unfocused-padding = 2
label-visible = %name%
label-visible-foreground = ${colors.aqua}
label-visible-underline = ${colors.aqua}
label-visible-padding = 2
label-urgent = %name%
label-urgent-foreground = ${colors.red}
label-urgent-underline = ${colors.red}
label-urgent-padding = 2
label-mode = %mode%
label-mode-foreground = ${colors.cream}
label-mode-padding = 2

[module/date]
type = internal/date
interval = 1
time =  %A, %d %b %Y -  %H:%M:%S
time-alt =  %H:%M
format = <label>
label = %time%
label-foreground = ${colors.cream}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume =  %percentage%%
label-volume-foreground = ${colors.warm}
format-muted = <label-muted>
label-muted = 󰝟
label-muted-foreground = ${colors.red}
click-right = pavucontrol

[module/power-profile]
type = custom/script
exec = ~/.local/bin/power-profile-indicator status
interval = 2
click-left = ~/.local/bin/power-profile-indicator notify

[module/backlight]
type = internal/backlight
card = amdgpu_bl1
format = <label>
label = 󰃠 %percentage%%
label-foreground = ${colors.yellow}

[module/temperature]
type = custom/script
exec = ~/.local/bin/cpu-temperature
interval = 3
format-foreground = ${colors.red}

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label =  %percentage%%
label-foreground = ${colors.yellow}

[module/network]
type = internal/network
interface = wlp2s0
interval = 3
format-connected = <label-connected>
label-connected =  %essid%
label-connected-foreground = ${colors.aqua}
format-disconnected = <label-disconnected>
label-disconnected = 󰤭
label-disconnected-foreground = ${colors.red}
click-left = nm-connection-editor

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
low-at = 15
format-charging = <label-charging>
label-charging =  %percentage%%
label-charging-foreground = ${colors.green}
format-discharging = <label-discharging>
label-discharging =  %percentage%%
label-discharging-foreground = ${colors.fg}
format-full = <label-full>
label-full =  %percentage%%
label-full-foreground = ${colors.green}
format-low = <label-low>
label-low =  %percentage%%
label-low-foreground = ${colors.red}

[module/keyboard]
type = custom/script
exec = ~/.local/bin/kb-layout-toggle status
interval = 2
click-left = ~/.local/bin/kb-layout-toggle toggle
format-foreground = ${colors.blue}

[module/notifications]
type = custom/script
exec = ~/.local/bin/dunst-notifications status
interval = 3
click-left = ~/.local/bin/dunst-notifications show
click-middle = ~/.local/bin/dunst-notifications toggle
click-right = ~/.local/bin/dunst-notifications clear

[module/tray]
type = internal/tray
format = <tray>
tray-spacing = 8px
