# ThinkPad E14 AMD fan curve.
# Uses the hottest value from CPU, iGPU and NVMe sensors.
sensors:
  - hwmon: /sys/class/hwmon
    name: k10temp
    indices: [1]

  - hwmon: /sys/class/hwmon
    name: amdgpu
    indices: [1]

  - hwmon: /sys/class/hwmon
    name: nvme
    indices: [1]
    optional: true

fans:
  - tpacpi: /proc/acpi/ibm/fan

levels:
  - ["level 2", 0, 44]
  - ["level 3", 40, 52]
  - ["level 4", 48, 62]
  - ["level 5", 58, 72]
  - ["level 7", 68, 80]
  - ["level full-speed", 76, 255]
