# Picom configuration - Gruvbox Dark Hard
backend = "glx";
vsync = true;
use-damage = true;

active-opacity = 1.0;
inactive-opacity = 0.92;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
  "100:class_g = 'firefox'",
  "100:class_g = 'vlc'",
  "94:class_g = 'Alacritty' && focused",
  "88:class_g = 'Alacritty' && !focused"
];

fading = true;
fade-delta = 4;
fade-in-step = 0.04;
fade-out-step = 0.04;

shadow = true;
shadow-radius = 18;
shadow-offset-x = -6;
shadow-offset-y = -6;
shadow-opacity = 0.42;
shadow-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Dunst'"
];

corner-radius = 12;
rounded-corners-exclude = [
  "class_g = 'Polybar'",
  "window_type = 'dock'"
];

blur-method = "dual_kawase";
blur-strength = 4;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;
blur-background-exclude = [
  "class_g = 'slop'",
  "class_g = 'maim'",
  "class_g = 'flameshot'"
];

wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.95; focus = true; };
  dock = { shadow = false; clip-shadow-above = true; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.95; };
  dropdown_menu = { opacity = 0.95; };
};
